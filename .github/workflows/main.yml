name: Auto Tech Blog Publisher

# 언제 실행할지 설정하는 부분
on:
  schedule:
    # 매일 UTC 기준 00:00 (한국 시간 오전 9시)에 실행
    # 시간 변경을 원하시면 crontab.guru 사이트를 참고하세요.
    - cron: '0 0 * * *'
  workflow_dispatch: # 이 줄이 있으면 내가 원할 때 수동으로 버튼을 눌러 실행할 수 있습니다.

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest # 가상의 리눅스 서버 대여

    steps:
    - name: 1. 내 코드(Repository) 가져오기
      uses: actions/checkout@v4

    - name: 1-1. 실행 시각 및 브랜치 확인
      run: |
        echo "RUN_AT_UTC=$(date -u '+%Y-%m-%d %H:%M:%S')"
        echo "REF=$GITHUB_REF"
        echo "SHA=$GITHUB_SHA"
        echo "WORKSPACE=$(pwd)"
        ls -la

    - name: 2. 파이썬 설치하기
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 안정적인 파이썬 3.10 버전 사용

    - name: 2-1. 런타임/환경변수 상태 확인
      run: |
        python --version
        pip --version
        echo "HAS_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY != '' }}"
        echo "HAS_GEMINI_MODEL=${{ vars.GEMINI_MODEL != '' }}"
        echo "HAS_MEDIUM_TOKEN=${{ secrets.MEDIUM_INTEGRATION_TOKEN != '' }}"
        echo "HAS_AUTHOR_ID=${{ secrets.AUTHOR_ID != '' }}"

    - name: 3. 필요한 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip list | grep -E "requests|google-generativeai" || true

    - name: 4. 자동 블로그 스크립트 실행!
      env: # GitHub Secrets에 저장한 키를 불러옵니다.
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        DEVTO_TAGS: ${{ vars.DEVTO_TAGS }}
        MEDIUM_INTEGRATION_TOKEN: ${{ secrets.MEDIUM_INTEGRATION_TOKEN }}
        AUTHOR_ID: ${{ secrets.AUTHOR_ID }}
      run: python scripts/auto_blog_pipeline.py

    - name: 5. 생성된 마크다운 파일 확인
      run: |
        if [ -d "it-guide/src/posts" ]; then
          echo "📁 생성된 마크다운 파일 목록:"
          ls -la it-guide/src/posts/
          echo "📁 최신 파일 5개"
          ls -lt it-guide/src/posts/ | head -n 6
          echo "📌 git status"
          git status --short
        else
          echo "⚠️ posts 폴더가 없습니다."
        fi

    - name: 6. Git 설정 및 커밋/푸시
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A it-guide/src/posts
        echo "📌 staged diff summary"
        git diff --cached --stat || true
        if git diff-index --quiet HEAD --; then
          echo "✓ 변경 사항이 없습니다."
        else
          git commit -m "🤖 자동 블로그 포스팅: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
          echo "✅ 변경 사항을 GitHub에 푸시했습니다."
        fi
